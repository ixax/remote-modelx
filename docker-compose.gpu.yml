# Optional override: reserves the host's NVIDIA GPU for the `ollama` and
# `reranker` services. Apply on top of the base file, don't replace it:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
#
# Requires an NVIDIA GPU reachable from Docker -- on Windows that's Docker
# Desktop with the WSL2 backend plus the NVIDIA driver installed on the
# Windows host (it provides CUDA support inside WSL2 itself; no separate
# driver install inside WSL/the container). On Linux, the NVIDIA Container
# Toolkit. Not applicable on macOS -- Docker Desktop there has no GPU
# passthrough path (Metal or otherwise) into containers.
#
# reranker's build assumes a CUDA 12.1-compatible driver (most recent-ish
# NVIDIA drivers qualify). For an older driver, edit the nvidia case in
# reranker/Dockerfile (e.g. cu118) and rebuild.
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  reranker:
    build:
      args:
        GPU_VENDOR: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
