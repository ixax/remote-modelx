x-vars:
  ollama_port: &ollama_port ${OLLAMA_PORT:-11434}
  ollama_host: &ollama_host ${OLLAMA_HOST:-ollama:11434}
  ollama_models: &ollama_models ${OLLAMA_MODELS:-}
  reranker_port: &reranker_port ${RERANKER_PORT:-50051}
  reranker_model: &reranker_model ${RERANKER_MODEL:-}
  log_level: &log_level ${LOG_LEVEL:-INFO}
  model_smoketest_prompt: &model_smoketest_prompt ${MODEL_SMOKETEST_PROMPT:-Hello, who are you?}

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
    ports:
      - target: 11434
        published: *ollama_port
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: *ollama_host
      OLLAMA_MODELS: *ollama_models
    entrypoint: ["/entrypoint.sh"]
    volumes:
      - ./ollama/entrypoint.sh:/entrypoint.sh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

  model-smoketest:
    image: ollama/ollama:latest
    container_name: model-smoketest
    profiles: ["smoketest"]
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      OLLAMA_HOST: *ollama_host
      OLLAMA_MODELS: *ollama_models
      MODEL_SMOKETEST_PROMPT: *model_smoketest_prompt
    entrypoint: ["/entrypoint.sh"]
    volumes:
      - ./ollama/smoketest.sh:/entrypoint.sh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

  reranker:
    build:
      context: ./reranker
    container_name: reranker
    restart: on-failure
    command: ["uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "50051"]
    ports:
      - target: 50051
        published: *reranker_port
    environment:
      RERANKER_MODEL: *reranker_model
      LOG_LEVEL: *log_level
    volumes:
      - ./reranker/src:/app/src
      - ./reranker/config.yml:/app/config.yml
      - reranker_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50051'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  ollama_data:
  reranker_cache:
