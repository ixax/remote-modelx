# Standalone Ollama + reranker deployment, meant to run together and be
# copied into another project wholesale. Not on the same Docker network as
# any consumer project -- consumer services reach these over the host
# (OLLAMA_HOST/OLLAMA_PORT, RERANKER_HOST/RERANKER_PORT in the consumer's
# own .env), not via container-name DNS.
#
#   cp .env.example .env   # set OLLAMA_MODELS if you need Ollama models; RERANKER_MODEL if you need reranking
#   docker compose up -d --build
#
# GPU: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build

# Scalars pulled from the environment (with defaults), defined once here and
# referenced by anchor below instead of repeating "${VAR:-default}" inline.
x-vars:
  ollama_port: &ollama_port ${OLLAMA_PORT:-11434}
  ollama_models: &ollama_models ${OLLAMA_MODELS:-}
  reranker_port: &reranker_port ${RERANKER_PORT:-50051}
  reranker_model: &reranker_model ${RERANKER_MODEL:-}
  log_level: &log_level ${LOG_LEVEL:-INFO}
  model_smoketest_prompt: &model_smoketest_prompt ${MODEL_SMOKETEST_PROMPT:-Hello, who are you?}
  # CPU by default; docker-compose.gpu.yml overrides this to a CUDA wheel
  # index. Not just a default ARG in the Dockerfile because compose only
  # forwards build args it's told about here.
  reranker_torch_index: &reranker_torch_index ${RERANKER_TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      # "-1": once a model is loaded into memory it stays loaded forever
      # (never auto-unloaded after Ollama's default 5m idle timeout).
      # Trades RAM for avoiding the ~1 minute cold-load stall (model file
      # read + llama-server spin-up) on the first request after idle.
      OLLAMA_KEEP_ALIVE: "-1"
    ports:
      - target: 11434
        published: *ollama_port
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "ollama:11434"
      OLLAMA_MODELS: *ollama_models
    # Script lives in ollama/entrypoint.sh (bind-mounted, not baked into
    # the image) -- pulls, then warms each model in OLLAMA_MODELS into
    # memory in turn (see OLLAMA_KEEP_ALIVE: "-1" above). Skips entirely
    # when unset (a reranker-only deployment needs no Ollama models at all
    # -- see that script for details).
    entrypoint: ["/entrypoint.sh"]
    volumes:
      - ./ollama/entrypoint.sh:/entrypoint.sh:ro
    restart: "no"

  # Manual smoke test, not part of `make up` -- sends a fixed prompt to
  # every OLLAMA_MODELS entry and logs the reply so a human can eyeball
  # that each one actually works, not just that it loaded. Gated behind
  # the `smoketest` profile so a plain `docker compose up`/`up -d` never
  # starts it; run it with `make smoketest` (see ollama/smoketest.sh).
  model-smoketest:
    image: ollama/ollama:latest
    container_name: model-smoketest
    profiles: ["smoketest"]
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      OLLAMA_HOST: "ollama:11434"
      OLLAMA_MODELS: *ollama_models
      MODEL_SMOKETEST_PROMPT: *model_smoketest_prompt
    entrypoint: ["/entrypoint.sh"]
    volumes:
      - ./ollama/smoketest.sh:/entrypoint.sh:ro
    restart: "no"

  reranker:
    build:
      context: ./reranker
      args:
        TORCH_INDEX_URL: *reranker_torch_index
    container_name: reranker
    # Not unless-stopped: entrypoint.sh exits 0 (not a crash) when
    # RERANKER_MODEL is unset, so this must not restart-loop in that case.
    # A real crash (non-zero exit) still gets retried.
    restart: on-failure
    # Matches the Dockerfile CMD -- kept explicit here so it's an obvious,
    # easy override point (e.g. append `--reload` for dev without editing
    # the image).
    command: ["uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "50051"]
    ports:
      - target: 50051
        published: *reranker_port
    environment:
      # Optional: a consumer project that doesn't need reranking leaves this
      # unset -- entrypoint.sh logs why and exits 0 instead of starting.
      RERANKER_MODEL: *reranker_model
      LOG_LEVEL: *log_level
    volumes:
      - ./reranker/src:/app/src
      - ./reranker/config.yml:/app/config.yml
      - reranker_cache:/root/.cache/huggingface
    healthcheck:
      # Raw TCP check, not curl -- curl isn't installed in this image.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/50051'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  ollama_data:
  reranker_cache:
