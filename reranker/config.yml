# reranker service configuration -- inference tuning knobs.
#
# Host/port for the HTTP server itself, and the cross-encoder model id, are
# environment variables (RERANKER_HOST/RERANKER_PORT/RERANKER_MODEL, see
# docker-compose.yml/.env), not here. Since ./src is bind-mounted into the
# container, editing this file and restarting the service is enough -- no
# rebuild needed.

# Placeholder -- overwritten at startup from the RERANKER_MODEL env var
# (see server.py). Whatever is written here is ignored.
model: "$RERANKER_MODEL"

# Max input length (tokens) the cross-encoder truncates each query+document
# pair to. Integer > 0. Higher = handles longer documents but is slower and
# uses more memory. 512 is a reasonable default for short-to-medium
# document chunks; raise it if the consumer project's chunks run longer.
max_length: 512
